services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: compare_stt
      POSTGRES_PASSWORD: compare_stt_dev
      POSTGRES_DB: compare_stt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
